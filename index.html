    // ═══════════════ ALL TICKETS ═══════════════
    function AllTickets({ tickets, isManager, editTicket, delTicket, addNote, toggleTag, user, viewMode, setViewMode, onImageClick }) {
        const [search, setSearch] = useState('');
        const [filter, setFilter] = useState('הכל');
        const [sel, setSel] = useState(null);
        const [editing, setEditing] = useState(null);

        const filtered = tickets.filter(t => {
            const ms = !search || [t.id,t.location,t.description,t.openedByName,t.assignedToName].some(v=>v?.toLowerCase().includes(search.toLowerCase()));
            return ms && (filter==='הכל'||t.status===filter);
        });

        const handleNote = (id,text) => { addNote(id,text); setSel(p=>({...p,managerNotes:[...(p.managerNotes||[]),{id:Date.now(),text,date:new Date().toLocaleString('he-IL',{dateStyle:'short',timeStyle:'short'}),by:user.name}]})); };
        const handleTag = (id,tag) => { toggleTag(id,tag); setSel(p=>{const c=p.tags||[];return{...p,tags:c.includes(tag)?c.filter(x=>x!==tag):[...c,tag]};}); };

        return (
            <div>
                <div className="page-header">
                    <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                        <h1 className="page-title">כל הקריאות</h1>
                        <span className="count-badge" style={{ background:'var(--bg)', color:'var(--muted)' }}>{filtered.length}</span>
                    </div>
                    <div className="view-toggle">
                        <button className={`view-btn ${viewMode==='grid'?'active':''}`} onClick={()=>setViewMode('grid')} title="תצוגת אריחים"><Icon n="th-large" /></button>
                        <button className={`view-btn ${viewMode==='list'?'active':''}`} onClick={()=>setViewMode('list')} title="תצוגת רשימה"><Icon n="list" /></button>
                    </div>
                </div>

                <div className="filter-bar">
                    <div className="search-wrap"><Icon n="search" /><input className="input" value={search} onChange={e=>setSearch(e.target.value)} placeholder="חיפוש..." /></div>
                    <div className="filter-pills">
                        {['הכל',S.OPEN,S.TAKEN,S.DONE,S.VENDOR].map(s=>(
                            <button key={s} className={`filter-pill${filter===s?' active':''}`} onClick={()=>setFilter(s)}>{s}</button>
                        ))}
                    </div>
                </div>

                {filtered.length===0 ? (
                    <div className="empty-state"><div className="empty-title">לא נמצאו קריאות</div></div>
                ) : viewMode === 'list' ? (
                    <UnifiedTicketTable tickets={filtered} onRowClick={setSel} />
                ) : (
                    <div className="tickets-grid tickets-grid-2">
                        {filtered.map(t=>{
                            const thumb = t.images?.[0] || t.image;
                            return (
                                <div key={t.id} className="ticket-card" style={{cursor:'pointer'}} onClick={()=>setSel(t)}>
                                    <div style={{display:'flex',gap:10}}>
                                        {thumb && <img src={thumb} onClick={(e)=>{e.stopPropagation();onImageClick(thumb);}} style={{width:50,height:50,objectFit:'cover',borderRadius:10,flexShrink:0,cursor:'zoom-in'}} alt=""/>}
                                        <div style={{flex:1,minWidth:0}}>
                                            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}><code style={{ fontSize:14, fontWeight:800, color:'var(--text)', border:'1px solid var(--border-strong)', background:'var(--surface)', padding:'2px 8px', borderRadius:6 }}>{t.id}</code><SBadge s={t.status}/></div>
                                            <div style={{fontWeight:700,fontSize:14,marginBottom:4}}>{t.location}</div>
                                            <div style={{display:'flex',gap:5,flexWrap:'wrap'}}><PBadge p={t.priority}/>{t.assignedToName&&<span style={{fontSize:11,color:'var(--blue)',background:'var(--blue-pale)',padding:'2px 8px',borderRadius:99}}>{t.assignedToName}</span>}</div>
                                        </div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                )}

                {sel && <TicketModal ticket={sel} onClose={()=>setSel(null)} onNote={isManager?handleNote:null} onTag={isManager?handleTag:null} onReopen={isManager?(id)=>{editTicket(id,{status:S.OPEN,assignedTo:'',assignedToName:''});setSel(p=>({...p,status:S.OPEN}));}:null} onImageClick={onImageClick} onDelete={isManager?delTicket:null} onEdit={isManager?()=>{setEditing(sel);setSel(null);}:null} user={user} editTicket={editTicket} />}
                {editing && <EditModal ticket={editing} onSave={(id,d)=>{editTicket(id,d);setEditing(null);}} onClose={()=>setEditing(null)} user={user} />}
            </div>
        );
    }

    // ═══════════════ TICKET DETAIL MODAL ═══════════════
    function TicketModal({ ticket, onClose, onNote, onTag, onReopen, onImageClick, onDelete, onEdit, user, editTicket }) {
        const [noteText, setNoteText] = useState('');
        const displayImages = ticket.images?.length > 0 ? ticket.images : (ticket.image ? [ticket.image] : []);

        const [wdesc, setWdesc] = useState(ticket.workDescription||'');
        const [vendor, setVendor] = useState(ticket.vendorName||'');
        const [vendorMode, setVendorMode] = useState(false);

        const handleTake = () => { editTicket(ticket.id, { status:S.TAKEN, assignedTo:user.username, assignedToName:user.name, takenDate:new Date().toLocaleString('he-IL',{dateStyle:'short',timeStyle:'short'}) }); onClose(); };
        const handleClose = () => { if(!wdesc.trim()){alert('יש לכתוב מה בוצע');return;} editTicket(ticket.id,{status:S.DONE,workDescription:wdesc,closedDate:new Date().toLocaleString('he-IL',{dateStyle:'short',timeStyle:'short'})}); onClose(); };
        const handleVendor = () => { if(!vendor.trim()){alert('יש לכתוב שם ספק');return;} if(!wdesc.trim()){alert('יש לכתוב מה הועבר');return;} editTicket(ticket.id,{status:S.VENDOR,vendorName:vendor,workDescription:wdesc}); onClose(); };

        const isMineWorker = user?.role === 'worker' && (ticket.assignedTo === user?.username || ticket.assignedToName === user?.name) && (ticket.status === S.TAKEN || ticket.status === S.VENDOR);
        const isOpenWorker = user?.role === 'worker' && ticket.status === S.OPEN;

        return (
            <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
                <div className="modal-box">
                    <div className="modal-handle" />
                    <div className="modal-header">
                        <div>
                            <div style={{fontWeight:800,fontSize:18}}>{ticket.location}</div>
                            <div style={{marginTop:8, display:'flex', alignItems:'center', gap:8}}><code style={{ fontSize:15, fontWeight:800, color:'var(--text)', border:'1px solid var(--border-strong)', background:'var(--surface)', padding:'2px 8px', borderRadius:6 }}>{ticket.id}</code> <span style={{fontSize:13,color:'var(--muted)'}}>{ticket.date}</span></div>
                        </div>
                        <div style={{display:'flex',gap:8}}>
                            {onEdit && (
                                <button className="btn btn-ghost btn-sm" onClick={onEdit}><Icon n="edit" />ערוך</button>
                            )}
                            {onDelete && (
                                <button className="btn btn-ghost btn-sm" style={{color:'var(--red)'}} onClick={()=>{if(confirm('למחוק את הקריאה?')){onDelete(ticket.id);onClose();}}}><Icon n="trash" />מחק</button>
                            )}
                            {onReopen && (ticket.status===S.DONE||ticket.status===S.VENDOR) && (
                                <button className="btn btn-ghost btn-sm" onClick={()=>onReopen(ticket.id)}><Icon n="sync-alt" />פתח מחדש</button>
                            )}
                            <button className="btn btn-icon" onClick={onClose}><Icon n="times" /></button>
                        </div>
                    </div>
                    <div className="modal-body">
                        {/* Status row */}
                        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}><SBadge s={ticket.status}/><PBadge p={ticket.priority}/></div>

                        {/* Description */}
                        <div className="section-box section-box-gray">
                            <p style={{fontSize:14,lineHeight:1.7,color:'var(--text-2)'}}>{ticket.description}</p>
                        </div>

                        {/* People */}
                        <div style={{display:'flex',flexDirection:'column',gap:6}}>
                            {ticket.openedByName && <div className="info-row"><Icon n="user" /><span>נפתח ע"י <strong>{ticket.openedByName}</strong></span></div>}
                            {ticket.assignedToName && <div className="info-row"><Icon n="user-check" style={{color:'var(--blue)'}} /><span style={{color:'var(--blue)'}}>טיפל: <strong>{ticket.assignedToName}</strong>{ticket.takenDate&&` (${ticket.takenDate})`}</span></div>}
                        </div>

                        {/* Work done */}
                        {ticket.workDescription && (
                            <div className="section-box section-box-green">
                                <div style={{fontWeight:700,fontSize:12,color:'var(--green)',marginBottom:5}}><Icon n="clipboard-check" style={{marginLeft:6}}/>מה בוצע</div>
                                <p style={{fontSize:14,color:'#166534'}}>{ticket.workDescription}</p>
                                {ticket.closedDate && <div style={{fontSize:11,color:'var(--subtle)',marginTop:4}}>נסגר: {ticket.closedDate}</div>}
                            </div>
                        )}

                        {/* Vendor */}
                        {ticket.vendorName && (
                            <div className="section-box section-box-teal">
                                <div style={{fontWeight:700,fontSize:12,color:'var(--teal)',marginBottom:4}}><Icon n="truck" style={{marginLeft:6}}/>הועבר לספק</div>
                                <div style={{fontSize:16,fontWeight:800,color:'#0f766e'}}>{ticket.vendorName}</div>
                            </div>
                        )}

                        {/* Worker Actions inside Modal */}
                        {isOpenWorker && (
                            <button className="btn btn-orange btn-full btn-lg" onClick={handleTake} style={{marginTop: 10}}><Icon n="hand-paper" />אני מטפל/ת בזה</button>
                        )}

                        {isMineWorker && (
                            <div className="action-zone" style={{ borderTop: '2px dashed var(--border)', marginTop: 14, paddingTop: 14, display: 'flex', flexDirection: 'column', gap: 12 }}>
                                <div className="form-group">
                                    <Label><Icon n="clipboard-check" style={{ marginLeft:6 }} />מה בוצע?</Label>
                                    <textarea className="input" value={wdesc} onChange={e=>setWdesc(e.target.value)} rows={3} placeholder="תאר את הטיפול שבוצע..." />
                                </div>

                                {ticket.status===S.TAKEN && vendorMode && (
                                    <div className="form-group">
                                        <Label><Icon n="truck" style={{ marginLeft:6, color:'var(--teal)' }} />שם הספק החיצוני</Label>
                                        <input className="input" value={vendor} onChange={e=>setVendor(e.target.value)} placeholder="לדוגמה: מיזוג-טק, אינסטל בע״מ" />
                                    </div>
                                )}

                                <div style={{ display:'flex', gap:8 }}>
                                    <button className="btn btn-green btn-full btn-lg" onClick={handleClose}><Icon n="check-circle" />טופלה</button>
                                    {ticket.status===S.TAKEN && !vendorMode && (
                                        <button className="btn btn-teal btn-full btn-lg" onClick={()=>setVendorMode(true)}><Icon n="truck" />הועבר לספק</button>
                                    )}
                                    {ticket.status===S.TAKEN && vendorMode && (
                                        <button className="btn btn-teal btn-full btn-lg" onClick={handleVendor}><Icon n="check" />אשר ספק</button>
                                    )}
                                </div>
                                {ticket.status===S.TAKEN && vendorMode && <button onClick={()=>setVendorMode(false)} style={{ fontSize:12, color:'var(--muted)', background:'transparent', border:'none', cursor:'pointer', fontFamily:'Heebo', textAlign:'center', padding:'4px' }}>ביטול</button>}
                            </div>
                        )}

                        {/* Tags */}
                        {onTag && (
                            <div>
                                <div style={{fontWeight:700,fontSize:14,marginBottom:8,display:'flex',alignItems:'center',gap:6,marginTop:10}}><Icon n="tags" style={{color:'var(--purple)'}}/>תיוג</div>
                                <div style={{display:'flex',flexWrap:'wrap',gap:7}}>
                                    {AVAILABLE_TAGS.map(tag=>{const a=ticket.tags?.includes(tag);return<button key={tag} className="tag-btn" onClick={()=>onTag(ticket.id,tag)} style={{borderColor:a?'var(--purple)':'var(--border)',background:a?'var(--purple)':'var(--surface)',color:a?'white':'var(--muted)',fontFamily:'Heebo'}}>{tag}</button>;})}
                                </div>
                            </div>
                        )}

                        {/* Notes */}
                        {onNote && (
                            <div>
                                <div style={{fontWeight:700,fontSize:14,marginBottom:8,display:'flex',alignItems:'center',gap:6,marginTop:10}}><Icon n="comment-dots" style={{color:'var(--purple)'}}/>הערות פנימיות</div>
                                {ticket.managerNotes?.length>0 && <div className="notes-list" style={{marginBottom:10}}>{ticket.managerNotes.map(n=><div key={n.id} className="note-item"><div className="note-meta">{n.date}{n.by&&` — ${n.by}`}</div><div className="note-text">{n.text}</div></div>)}</div>}
                                <textarea className="input" value={noteText} onChange={e=>setNoteText(e.target.value)} rows={3} placeholder="הוסף הערה לאיש האחזקה..." style={{marginBottom:8}} />
                                <button className="btn btn-full btn-lg" onClick={()=>{if(noteText.trim()){onNote(ticket.id,noteText);setNoteText('');}}} disabled={!noteText.trim()} style={{background:noteText.trim()?'var(--purple)':'var(--purple-border)',color:'white'}}>שמור הערה</button>
                            </div>
                        )}

                        {/* Images */}
                        {displayImages.length > 0 && <div>
                            <div style={{fontWeight:700,fontSize:14,marginBottom:8,display:'flex',alignItems:'center',gap:6,marginTop:10}}><Icon n="camera" style={{color:'var(--purple)'}}/>תמונות מהשטח</div>
                            <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                                {displayImages.map((img, idx) => (
                                    <img key={idx} src={img} onClick={() => onImageClick(img)} style={{width:'100%',maxHeight:300,objectFit:'contain',borderRadius:12,border:'1px solid var(--border)',background:'var(--bg)', cursor:'zoom-in'}} alt="" />
                                ))}
                            </div>
                        </div>}
                    </div>
                </div>
            </div>
        );
    }

    // ═══════════════ DASHBOARD ═══════════════
    function Dashboard({ tickets }) {
        const stats = [
            {l:'סה״כ',    c:tickets.length,                              i:'list',             bg:'var(--blue-pale)',   clr:'var(--blue)',   ic:'var(--blue)'},
            {l:'פתוחות',  c:tickets.filter(t=>t.status===S.OPEN).length, i:'exclamation-circle',bg:'var(--red-pale)',  clr:'var(--red)',    ic:'var(--red)'},
            {l:'בטיפול',  c:tickets.filter(t=>t.status===S.TAKEN).length,i:'tools',            bg:'var(--orange-pale)', clr:'var(--orange)', ic:'var(--orange)'},
            {l:'טופלו',   c:tickets.filter(t=>t.status===S.DONE).length, i:'check-circle',     bg:'var(--green-pale)',  clr:'var(--green)',  ic:'var(--green)'},
            {l:'לספק',    c:tickets.filter(t=>t.status===S.VENDOR).length,i:'truck',            bg:'var(--teal-pale)',  clr:'var(--teal)',   ic:'var(--teal)'},
        ];
        const urgent = tickets.filter(t=>t.priority==='דחופה'&&t.status===S.OPEN);
        const workerMap = {};
        tickets.forEach(t => {
            if (!t.assignedToName) return;
            if (!workerMap[t.assignedToName]) workerMap[t.assignedToName] = { taken:0, done:0, vendor:0 };
            if (t.status===S.TAKEN)  workerMap[t.assignedToName].taken++;
            if (t.status===S.DONE)   workerMap[t.assignedToName].done++;
            if (t.status===S.VENDOR) workerMap[t.assignedToName].vendor++;
        });

        return (
            <div style={{display:'flex',flexDirection:'column',gap:20}}>
                <div className="page-header"><h1 className="page-title">דשבורד ניהול</h1></div>

                <div className="stat-grid">
                    {stats.map(s=>(
                        <div key={s.l} className="stat-card" style={{background:s.bg}}>
                            <div className="stat-icon" style={{background:s.ic}}><Icon n={s.i} /></div>
                            <div><div className="stat-label">{s.l}</div><div className="stat-count" style={{color:s.clr}}>{s.c}</div></div>
                        </div>
                    ))}
                </div>

                {urgent.length>0 && (
                    <div className="card" style={{borderColor:'var(--red-border)',overflow:'hidden'}}>
                        <div style={{background:'var(--red-pale)',padding:'12px 18px',borderBottom:'1px solid var(--red-border)',fontWeight:700,color:'var(--red)',display:'flex',alignItems:'center',gap:8}}>
                            <Icon n="exclamation-triangle"/>{urgent.length} קריאות דחופות ממתינות
                        </div>
                        <div style={{padding:16,display:'flex',flexDirection:'column',gap:8}}>
                            {urgent.map(t=>(
                                <div key={t.id} style={{background:'var(--surface)',borderRadius:10,padding:'10px 14px',border:'1px solid var(--red-border)'}}>
                                    <div style={{fontWeight:700}}>{t.location}</div>
                                    <div style={{fontSize:13,color:'var(--muted)',marginTop:2}}>{t.description}</div>
                                    <div style={{marginTop:6, display:'flex', alignItems:'center', gap:6}}><code style={{ fontSize:13, fontWeight:800, color:'var(--text)', border:'1px solid var(--border-strong)', background:'var(--surface)', padding:'2px 6px', borderRadius:4 }}>{t.id}</code> <span style={{fontSize:12,color:'var(--subtle)'}}>{t.date}</span></div>
                                </div>
                            ))}
                        </div>
                    </div>
                )}

                {Object.keys(workerMap).length>0 && (
                    <div className="card">
                        <div style={{padding:'14px 18px',borderBottom:'1px solid var(--border)',fontWeight:700,fontSize:16,display:'flex',alignItems:'center',gap:8}}>
                            <Icon n="users" style={{color:'var(--orange)'}}/>סטטיסטיקת אנשי אחזקה
                        </div>
                        <div style={{padding:12,display:'flex',flexDirection:'column',gap:8}}>
                            {Object.entries(workerMap).map(([name,s])=>(
                                <div key={name} className="worker-row">
                                    <div style={{display:'flex',alignItems:'center',gap:10}}>
                                        <div className="worker-avatar" style={{background:'var(--orange)'}}>{name.charAt(0)}</div>
                                        <span style={{fontWeight:600}}>{name}</span>
                                    </div>
                                    <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                                        {s.taken>0&&<span className="badge" style={{background:'var(--orange-pale)',color:'var(--orange)'}}>בטיפול: {s.taken}</span>}
                                        {s.done>0&&<span className="badge" style={{background:'var(--green-pale)',color:'var(--green)'}}>טיפל: {s.done}</span>}
                                        {s.vendor>0&&<span className="badge" style={{background:'var(--teal-pale)',color:'var(--teal)'}}>ספק: {s.vendor}</span>}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                )}
            </div>
        );
    }

    // ═══════════════ USERS MANAGER ═══════════════
    function UsersManager() {
        const [users, setUsers] = useState([]); const [load, setLoad] = useState(true);
        const [showAdd, setShowAdd] = useState(false); const [editU, setEditU] = useState(null);
        const [newU, setNewU] = useState({username:'',password:'',name:'',role:'requester'});
        const [saving, setSaving] = useState(false); const [msg, setMsg] = useState('');

        const RC = { requester:{c:'var(--blue)',bg:'var(--blue-pale)'}, worker:{c:'var(--orange)',bg:'var(--orange-pale)'}, manager:{c:'var(--purple)',bg:'var(--purple-pale)'} };
        const RL = { requester:'עובד ייצור', worker:'איש אחזקה', manager:'מנהל' };

        const load_ = async () => { setLoad(true); try{const r=await fetch(`${API_URL}?action=getUsers`);const d=await r.json();setUsers(d.users||[]);}catch{} setLoad(false); };
        useEffect(()=>{load_();},[]);
        const flash = m => { setMsg(m); setTimeout(()=>setMsg(''),3000); };

        const save = async (action, data) => { setSaving(true); try{await fetch(API_URL,{method:'POST',body:JSON.stringify({action,user:data}),headers:{"Content-Type":"text/plain;charset=utf-8"},mode:'no-cors'});flash('✓ נשמר');setTimeout(()=>load_(),1500);}catch{flash('שגיאה');} setSaving(false); };
        const del = async un => { if(!confirm(`למחוק ${un}?`))return; try{await fetch(API_URL,{method:'POST',body:JSON.stringify({action:'deleteUser',username:un}),headers:{"Content-Type":"text/plain;charset=utf-8"},mode:'no-cors'});flash('✓ נמחק');setTimeout(()=>load_(),1500);}catch{flash('שגיאה');} };

        const handleAdd = () => { if(!newU.username||!newU.password||!newU.name){flash('יש למלא הכל');return;} save('addUser',newU); setNewU({username:'',password:'',name:'',role:'requester'}); setShowAdd(false); };
        const handleEdit = () => { if(!editU.name){flash('יש למלא שם');return;} save('deleteUser',editU); setTimeout(()=>save('addUser',editU),600); setEditU(null); };

        const Fields = ({d,setD,isEdit}) => (
            <div className="form-grid" style={{gap:14}}>
                <div className="form-group"><Label>שם מלא</Label><input className="input" value={d.name} onChange={e=>setD({...d,name:e.target.value})} placeholder="ישראל ישראלי" /></div>
                <div className="form-group">
                    <Label>שם משתמש</Label>
                    <input className="input" value={d.username} onChange={e=>setD({...d,username:e.target.value})} disabled={isEdit} style={{opacity:isEdit?0.6:1}} placeholder="israel1" autoComplete="off" />
                    {isEdit&&<Hint>שם משתמש לא ניתן לשינוי</Hint>}
                </div>
                <div className="form-group"><Label>{isEdit?'סיסמה חדשה (ריק = ללא שינוי)':'סיסמה'}</Label><input className="input" type="password" value={d.password} onChange={e=>setD({...d,password:e.target.value})} placeholder={isEdit?'השאר ריק לאי-שינוי':'סיסמה ראשונית'} autoComplete="new-password" /></div>
                <div className="form-group">
                    <Label>תפקיד</Label>
                    <div className="priority-group">
                        {Object.entries(RL).map(([v,l])=><button key={v} className="priority-btn" onClick={()=>setD({...d,role:v})} style={{borderColor:d.role===v?RC[v].c:'var(--border)',background:d.role===v?RC[v].bg:'var(--surface)',color:d.role===v?RC[v].c:'var(--muted)',fontSize:13}}>{l}</button>)}
                    </div>
                </div>
            </div>
        );

        return (
            <div style={{maxWidth:720}}>
                <div className="page-header">
                    <h1 className="page-title">ניהול משתמשים</h1>
                    <button className="btn btn-blue btn-md" onClick={()=>{setShowAdd(true);setEditU(null);}}><Icon n="plus"/>משתמש חדש</button>
                </div>
                {msg && <div className={`alert ${msg.startsWith('✓')?'alert-success':'alert-error'}`} style={{marginBottom:14}}>{msg}</div>}
                {load
                    ? <div style={{textAlign:'center',padding:48}}><Icon n="spinner" cls="spinner" style={{fontSize:28,color:'var(--muted)'}}/></div>
                    : <div style={{display:'flex',flexDirection:'column',gap:10}}>
                        {users.map(u=>(
                            <div key={u.username} className="user-row">
                                <div style={{display:'flex',alignItems:'center',gap:14}}>
                                    <div className="user-big-avatar" style={{background:RC[u.role]?.c||'var(--blue)'}}>{u.name?.charAt(0)||'?'}</div>
                                    <div>
                                        <div style={{fontWeight:700,fontSize:16}}>{u.name}</div>
                                        <div style={{fontSize:12,color:'var(--muted)',marginTop:1}}>@{u.username}</div>
                                        <span className="badge" style={{background:RC[u.role]?.bg,color:RC[u.role]?.c,marginTop:4,display:'inline-flex'}}>{RL[u.role]||u.role}</span>
                                    </div>
                                </div>
                                <div style={{display:'flex',gap:7}}>
                                    <button className="btn btn-ghost btn-sm" onClick={()=>{setEditU({...u,password:''});setShowAdd(false);}}><Icon n="edit"/></button>
                                    <button className="btn btn-danger btn-sm" onClick={()=>del(u.username)}><Icon n="trash"/></button>
                                </div>
                            </div>
                        ))}
                        {users.length===0&&<div className="empty-state"><div className="empty-title">אין משתמשים עדיין</div></div>}
                    </div>
                }

                {showAdd && (
                    <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)setShowAdd(false);}}>
                        <div className="modal-box">
                            <div className="modal-handle"/>
                            <div className="modal-header"><div style={{fontWeight:800,fontSize:18}}>משתמש חדש</div><button className="btn btn-icon" onClick={()=>setShowAdd(false)}><Icon n="times"/></button></div>
                            <div className="modal-body">
                                <Fields d={newU} setD={setNewU} isEdit={false} />
                                <button className="btn btn-blue btn-full btn-lg" onClick={handleAdd} disabled={saving}>{saving?<><Icon n="spinner" cls="spinner"/>שומר...</>:<><Icon n="user-plus"/>הוסף</>}</button>
                            </div>
                        </div>
                    </div>
                )}
                {editU && (
                    <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)setEditU(null);}}>
                        <div className="modal-box">
                            <div className="modal-handle"/>
                            <div className="modal-header">
                                <div><div style={{fontWeight:800,fontSize:18}}>עריכת משתמש</div><div style={{fontSize:12,color:'var(--muted)',marginTop:1}}>@{editU.username}</div></div>
                                <button className="btn btn-icon" onClick={()=>setEditU(null)}><Icon n="times"/></button>
                            </div>
                            <div className="modal-body">
                                <Fields d={editU} setD={setEditU} isEdit={true} />
                                <button className="btn btn-orange btn-full btn-lg" onClick={handleEdit} disabled={saving}>{saving?<><Icon n="spinner" cls="spinner"/>שומר...</>:<><Icon n="save"/>שמור</>}</button>
                            </div>
                        </div>
                    </div>
                )}
            </div>
        );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
